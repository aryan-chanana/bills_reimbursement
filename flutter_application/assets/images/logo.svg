<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Blue background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <!-- Gold rupee gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <!-- Green badge gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <!-- Badge shadow -->
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="outerClip">
      <circle cx="256" cy="256" r="252"/>
    </clipPath>
  </defs>

  <!-- ── Outer ring (thin border) ── -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="#1565C0" stroke-width="3"/>

  <!-- ── Main background circle ── -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)"/>

  <!-- ── Subtle decorative rings in background ── -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="40"/>
  <circle cx="400" cy="110" r="90"  fill="rgba(255,255,255,0.04)"/>
  <circle cx="112" cy="400" r="110" fill="rgba(255,255,255,0.04)"/>

  <!-- ── Receipt / card ── -->
  <g filter="url(#cardShadow)">
    <g transform="rotate(-7, 256, 265)">
      <!-- Card body -->
      <rect x="138" y="108" width="228" height="304" rx="22" fill="white"/>

      <!-- Receipt zigzag bottom edge (5 triangles) -->
      <polygon points="138,388 161,412 184,388 207,412 230,388 253,412 276,388 299,412 322,388 345,412 366,388" fill="white"/>

      <!-- Top accent bar -->
      <rect x="138" y="108" width="228" height="28" rx="22" fill="#E3F2FD"/>
      <rect x="138" y="122" width="228" height="14" fill="#E3F2FD"/>

      <!-- Bill line items -->
      <rect x="168" y="158" width="168" height="9" rx="4.5" fill="#BBDEFB"/>
      <rect x="168" y="178" width="130" height="9" rx="4.5" fill="#BBDEFB"/>
      <rect x="168" y="198" width="150" height="9" rx="4.5" fill="#BBDEFB"/>

      <!-- Thin divider -->
      <rect x="168" y="222" width="168" height="2" fill="#E3F2FD"/>

      <!-- Rupee symbol (large, gold) -->
      <text x="252" y="318"
            text-anchor="middle"
            font-family="Arial Black, Arial, sans-serif"
            font-size="100"
            font-weight="900"
            fill="url(#goldGrad)">₹</text>

      <!-- Amount placeholder line below rupee -->
      <rect x="192" y="336" width="120" height="10" rx="5" fill="#E3F2FD"/>
    </g>
  </g>

  <!-- ── Green approval badge (top-right, overlapping card) ── -->
  <g filter="url(#badgeShadow)">
    <circle cx="338" cy="138" r="52" fill="url(#greenGrad)"/>
    <!-- White ring inside badge -->
    <circle cx="338" cy="138" r="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
    <!-- Checkmark -->
    <polyline points="313,138 330,156 365,115"
              stroke="white" stroke-width="11" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
